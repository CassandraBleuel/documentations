site_name: Documentation

theme:
  name: material

  palette:

    # Light mode
    - scheme: default
      primary: teal
      accent: ligth blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Dark mode
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

  font:
    text: Roboto
    code: Roboto Mono

  logo: images/toegevoegd.png

nav:
  - Home: index.md
  - Tab: tab.md
  - Compleet: compleet.md

markdown_extensions:
  - pymdownx.superfences